name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generate Snake SVG
        uses: Platane/snk/build@master
        id: snake-svg
        with:
          github_user_name: Abhaykumar99
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Create output directory and copy files
        run: |
          mkdir -p output
          if [ -f "dist/github-contribution-grid-snake.svg" ]; then
            cp dist/github-contribution-grid-snake.svg output/
          fi
          if [ -f "dist/github-contribution-grid-snake-dark.svg" ]; then
            cp dist/github-contribution-grid-snake-dark.svg output/
          fi

      - name: Commit and Push
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action Bot"
            git add output/
            git commit -m "Generate snake animation"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
